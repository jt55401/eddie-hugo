# Default configuration for the Eddie Hugo module.
# Site owners can override any of these in their own hugo.toml
# under [params.eddie].

[params.eddie]
  enabled = true
  indexUrl = "/eddie/index.ed"
  position = "bottom-right"
  theme = "auto"
  qaMode = "auto"
  qaSubject = ""
  topK = 8
  answerTopK = 5

[module]
  [module.hugoVersion]
    min = "0.110.0"
